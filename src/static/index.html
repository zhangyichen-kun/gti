<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudDisk 云盘</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="header-left">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <h1 class="logo-text">CloudDisk</h1>
            <span class="beta-badge">v1.0</span>
        </div>
        <div class="header-right">
            <button id="uploadBtn" class="btn-upload">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                上传图片
            </button>
            <input type="file" id="fileInput" accept="image/*" multiple hidden>
        </div>
    </header>

    <!-- 上传进度条 -->
    <div id="progressBar" class="progress-bar hidden">
        <div class="progress-fill"></div>
        <span class="progress-text">上传中...</span>
    </div>

    <!-- 主要内容区 -->
    <main class="main">
        <!-- 空状态 -->
        <div id="emptyState" class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
            <p class="empty-title">还没有图片</p>
            <p class="empty-subtitle">点击上方「上传图片」按钮开始使用</p>
        </div>

        <!-- 统计信息 -->
        <div id="statsBar" class="stats-bar hidden">
            <span id="fileCount">共 0 张图片</span>
        </div>

        <!-- 文件卡片网格 -->
        <div id="fileGrid" class="file-grid"></div>
    </main>

    <!-- 图片预览模态框 -->
    <div id="previewModal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <img id="previewImage" src="" alt="预览">
            <div class="modal-info">
                <span id="previewName"></span>
                <span id="previewSize"></span>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
